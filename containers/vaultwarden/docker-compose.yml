name: vaultwarden
services:
    server:
        container_name: vaultwarden
        volumes:
            - /vw-data/:/data/
        restart: unless-stopped
        ports:
            - 7000:80
        image: vaultwarden/server:latest
        networks:
            - reverse_proxy
  
networks:
  reverse_proxy:
    name: reverse_proxy
    external: true
